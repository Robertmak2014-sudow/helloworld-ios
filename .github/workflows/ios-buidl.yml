name: Build and Archive Project Folder

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-zip:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Xcode project from Swift Package
        run: |
          xcodebuild \
            -scheme "HelloWorld" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            OTHER_CODE_SIGN_FLAGS="" \
            SWIFT_COMPILATION_MODE=wholemodule \
            OTHER_SWIFT_FLAGS="-parse-as-library" \
            build

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          echo "Xcode version: $(xcodebuild -version)"

      - name: Build for iOS (no code signing)
        run: |
          xcodebuild \
            -project "HelloWorld.xcodeproj" \
            -scheme "HelloWorld" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            OTHER_CODE_SIGN_FLAGS="" \
            build

      - name: Create ZIP archive of project folder
        run: |
          # Создаём ZIP-архив всей текущей папки (исключая .git и build)
          zip -r project-archive.zip . \
            -x ".git/*" \
            -x "*.zip"
          echo "✅ ZIP archive created: project-archive.zip"

      - name: Upload project archive as artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-source-code
          path: project-archive.zip
          retention-days: 7
