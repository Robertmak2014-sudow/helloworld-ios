name: Create IPA from Binary and Info.plist

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  create-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .app bundle and IPA
        run: |
          # Создаём папку для вывода
          mkdir -p output

          # Пути к файлам (в корне репозитория)
          BINARY_PATH="./HelloWorld"
          INFO_PLIST_SOURCE="./Info.plist"
          APP_NAME="HelloWorld"
          BUNDLE_DIR="output/Payload/${APP_NAME}.app"

          # Проверяем существование бинарника
          if [ ! -f "$BINARY_PATH" ]; then
            echo "Error: Binary not found at $BINARY_PATH"
            echo "Please make sure the binary file 'HelloWorld' is in the project root"
            exit 1
          fi

          # Проверяем существование Info.plist
          if [ ! -f "$INFO_PLIST_SOURCE" ]; then
            echo "Error: Info.plist not found at $INFO_PLIST_SOURCE"
            echo "Please create and commit Info.plist in the project root"
            exit 1
          fi

          # Создаём структуру .app-bundle
          mkdir -p "$BUNDLE_DIR"

          # Копируем бинарник в bundle (с именем исполняемого файла)
          cp "$BINARY_PATH" "$BUNDLE_DIR/${APP_NAME}"

          # Копируем Info.plist в bundle
          cp "$INFO_PLIST_SOURCE" "$BUNDLE_DIR/Info.plist"

          # Упаковываем в IPA
          cd output
          zip -r "../${APP_NAME}.ipa" Payload/
          cd ..

          echo "✅ IPA created: ${APP_NAME}.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: |
            *.ipa
          retention-days: 7
