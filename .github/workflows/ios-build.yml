name: Build iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: |
          # Устанавливаем последнюю версию Xcode
          echo "Using latest Xcode version"

      - name: Create Xcode project from Swift Package
        run: |
          swift package generate-xcodeproj

      - name: Build iOS app
        run: |
          xcodebuild -project HelloWorld.xcodeproj \
            -scheme HelloWorld \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            build

      - name: Upload .app as artifact
        uses: actions/upload-artifact@v4
        with:
          name: HelloWorld-app
          path: build/Debug-iphonesimulator/HelloWorld.app
