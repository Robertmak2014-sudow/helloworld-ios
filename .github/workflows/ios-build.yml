name: Build IPA for Jailbreak Device

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Create unsigned IPA
        run: |
          mkdir -p output
      
          # Полный путь к собранному приложению
          APP_PATH="/Users/runner/work/helloworld-ios/helloworld-ios/build/Build/Products/Release-iphoneos/HelloWorld"
      
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: .app file not found at $APP_PATH"
            exit 1
          fi
      
          # Имя приложения без расширения
          APP_NAME="HelloWorld"
      
          # Создаём структуру IPA: Payload/HelloWorld.app
          PAYLOAD_DIR="output/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"
      
          # Архивируем в IPA
          cd output
          zip -r "../${APP_NAME}.ipa" Payload/
          cd ..
      
          echo "✅ IPA created: ${APP_NAME}.ipa"

