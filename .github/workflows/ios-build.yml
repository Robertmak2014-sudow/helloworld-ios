name: Build iOS App for iPhone 14 Pro Max

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest  # Обязательно macOS — для сборки iOS


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          echo "Xcode version: $(xcodebuild -version)"
      - name: Ensure device is trusted
        run: |
          # Проверяем подключённые устройства (для диагностики)
          system_profiler SPUSBDataType | grep -A 5 -B 5 "iPhone"
      - name: Build for iPhone 14 Pro Max (real device)
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
          SDKROOT: iphoneos
        run: |
          xcodebuild \
            -scheme HelloWorld \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            build \
          # Пояснения к параметрам:
          # -scheme HelloWorld — схема сборки из вашего проекта
          # -sdk iphoneos — сборка для реальных устройств iOS (не симуляторов)
          # -destination "generic/platform=iOS" — любой подключённый iPhone
          # build — только сборка, без установки/запуска
      - name: Archive build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Build-Artifacts
          path: |
            DerivedData/Build/Products/Debug-iphoneos/
            # Или укажите точный путь, если он отличается
          retention-days: 7
