name: Build IPA for Jailbreak Device

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          echo "Xcode version: $(xcodebuild -version)"

      - name: Build for iOS (no code signing)
        run: |
          xcodebuild \
            -scheme "HelloWorld" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            OTHER_CODE_SIGN_FLAGS="" \
            build

      - name: Create unsigned IPA
        run: |
          # Создаём папку для IPA
          mkdir -p output

          # Находим собранное приложение (.app)
          APP_PATH=$(find DerivedData -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found"
            exit 1
          fi

          # Получаем имя приложения из пути
          APP_NAME=$(basename "$APP_PATH" .app)

          # Копируем .app в Payload
          PAYLOAD_DIR="output/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"

          # Архивируем в IPA
          cd output
          zip -r "../${APP_NAME}.ipa" Payload/
          cd ..

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: |
            *.ipa
          retention-days: 7
