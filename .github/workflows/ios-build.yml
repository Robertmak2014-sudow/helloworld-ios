name: Build IPA for Jailbreak Device

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: debug
        run: |
          echo "=== Contents of ./build/Build/Products ==="
          find ./build/Build/Products -type d -name "*.app"
          ls -la ./build/Build/Products/Release-iphoneos/

      - name: Create unsigned IPA
        run: |
          mkdir -p output
      
          # Получаем точный путь к продуктам сборки
          BUILD_DIR=$(xcodebuild -scheme "HelloWorld" -showBuildSettings | grep BUILT_PRODUCTS_DIR | head -1 | cut -d ' ' -f3-)
      
      
          if [ -z "$BUILD_DIR" ]; then
            echo "Error: Could not determine BUILT_PRODUCTS_DIR"
            exit 1
          fi
      
          echo "Build products directory: $BUILD_DIR"
      
          # Ищем .app-bundle в этой папке
          APP_PATH=$(find "$BUILD_DIR" -name "*.app" -type d | head -1)
      
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app bundle not found in $BUILD_DIR"
            # Выводим содержимое папки для отладки
            ls -la "$BUILD_DIR" 2>/dev/null || echo "Directory is empty or does not exist"
            exit 1
          fi
      
          APP_NAME=$(basename "$APP_PATH" .app)
          PAYLOAD_DIR="output/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"
      
          cd output
          zip -r "../${APP_NAME}.ipa" Payload/
          cd ..
      
          echo "✅ IPA created: ${APP_NAME}.ipa"

        


