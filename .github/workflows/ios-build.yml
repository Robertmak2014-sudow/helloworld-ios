name: Build IPA for Jailbreak Device

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          echo "Xcode version: $(xcodebuild -version)"

      - name: Build for iOS (no code signing)
        run: |
          xcodebuild \
            -scheme "HelloWorld" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            OTHER_CODE_SIGN_FLAGS="" \
            SWIFT_COMPILATION_MODE=wholemodule \
            OTHER_SWIFT_FLAGS="-parse-as-library" \
            build

      - name: Package full build output as artifact
        run: |
          mkdir -p build-artifact
          cp -R ./build/* build-artifact/ || echo "No files in ./build, continuing..."
          if [ -z "$(ls -A build-artifact)" ]; then
            echo "Build folder is empty, copying all project files..."
            cp -R ./* build-artifact/ 2>/dev/null || echo "Could not copy project files"
          fi
          echo "✅ Full build output packaged in build-artifact/"

      - name: Upload full build artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-build-output
          path: |
            build-artifact/
          retention-days: 7
